# Docker Compose 配置文件 - SQLite 版本
# 使用 SQLite 数据库，无需额外的数据库容器

services:
  # Next.js 应用（SQLite 版本：PRISMA_PROVIDER=sqlite）
  nav:
    image: nav:sqlite
    build:
      context: .
      args:
        PRISMA_PROVIDER: sqlite
    container_name: nav
    restart: unless-stopped
    ports:
      - ${PORT:-3000}:3000
    environment:
      DATABASE_URL: file:/app/data/nav.db
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NODE_ENV: production
    volumes:
      - sqlite-data:/app/data
    networks:
      - network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  sqlite-data:
    driver: local

networks:
  network:
    driver: bridge
